name: Build Ayuchan ISO

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    # 在 Debian bookworm 容器内构建，避免 Ubuntu runner 上 live-build 源配置错误
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== 磁盘使用 ==="
          df -h /
          apt-get clean || true
          rm -rf /var/lib/apt/lists/* || true

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates git
          chmod +x setup-build-host.sh build.sh auto/config
          chmod +x config/hooks/normal/*.chroot 2>/dev/null || true
          ./setup-build-host.sh

      - name: Build ISO
        run: ./build.sh

      - name: Prepare release name
        id: meta
        run: |
          ISO="$(find . -maxdepth 1 -name '*.iso' -type f | head -n1)"
          if [[ -z "$ISO" ]]; then
            echo "未找到 ISO 文件"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME:-dev}"
          if [[ "$VERSION" == "dev" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          fi
          SAFE="ayuchan-linux-${VERSION}-amd64.iso"
          cp "$ISO" "$SAFE"
          sha256sum "$SAFE" | tee "${SAFE}.sha256"
          echo "iso=$SAFE" >> "$GITHUB_OUTPUT"
          echo "sha256=${SAFE}.sha256" >> "$GITHUB_OUTPUT"
          ls -lh "$SAFE" "${SAFE}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayuchan-linux-iso
          path: |
            ${{ steps.meta.outputs.iso }}
            ${{ steps.meta.outputs.sha256 }}
          retention-days: 14
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.meta.outputs.iso }}
            ${{ steps.meta.outputs.sha256 }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
