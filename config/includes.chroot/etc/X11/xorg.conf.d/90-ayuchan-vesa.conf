# 强制通用显卡驱动（VESA，配合内核 nomodeset，不依赖 i915/amdgpu 等）
Section "Device"
    Identifier "AyuchanVesa"
    Driver "vesa"
EndSection

Section "Screen"
    Identifier "AyuchanScreen"
    Device "AyuchanVesa"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1024x768" "800x600"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "AyuchanLayout"
    Screen "AyuchanScreen"
EndSection
