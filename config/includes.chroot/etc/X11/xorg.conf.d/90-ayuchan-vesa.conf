# 强制 VESA 通用显卡驱动（配合内核 nomodeset，几乎任何机器都能出画面）
Section "Device"
    Identifier "AyuchanVesa"
    Driver "vesa"
EndSection

Section "Screen"
    Identifier "AyuchanScreen"
    Device "AyuchanVesa"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1024x768" "800x600"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "AyuchanLayout"
    Screen "AyuchanScreen"
EndSection
