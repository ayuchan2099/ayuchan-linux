# 通用帧缓冲驱动（配合 nomodeset，不依赖 LightDM / 厂商 X 驱动）
Section "Device"
    Identifier "AyuchanFB"
    Driver "fbdev"
    Option "fbdev" "/dev/fb0"
EndSection

Section "Screen"
    Identifier "AyuchanScreen"
    Device "AyuchanFB"
    DefaultDepth 24
EndSection

Section "ServerLayout"
    Identifier "AyuchanLayout"
    Screen "AyuchanScreen"
EndSection
